project:
  name: rlhf-clinical-reasoning
  phase: phase-1

model:
  base_model: mistralai/Mistral-7B-Instruct-v0.2
  quantization: 4bit

dataset:
  train_file: data/processed/phase1_train.jsonl
  eval_file: data/processed/phase1_eval.jsonl
  min_pairs_for_phase1: 200

training:
  method: dpo
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5e-6
  num_train_epochs: 1

inference:
  max_new_tokens: 384
  temperature: 0.2
  top_p: 0.9
