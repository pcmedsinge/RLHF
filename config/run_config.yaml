project:
  name: rlhf-clinical-reasoning
  phase: phase-2

model:
  base_model: mistralai/Mistral-7B-Instruct-v0.2
  quantization: 4bit

dataset:
  train_file: data/processed/phase2_train_approved.jsonl
  eval_file: data/processed/phase2_eval_approved.jsonl
  min_pairs_for_phase1: 200

training:
  method: dpo
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.000005
  num_train_epochs: 1
  beta: 0.1
  output_dir: training/dpo_adapter

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

inference:
  max_new_tokens: 384
  temperature: 0.2
  top_p: 0.9
